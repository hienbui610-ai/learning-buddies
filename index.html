    return;
  }
  var levelLabel=st.level==='leading'?'🟢 Dẫn đầu':(st.level==='on-track'?'🟡 Theo kịp':(st.level==='needs-help'?'🔴 Cần hỗ trợ':'⚫ Chưa HĐ'));
  var body='<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'
    +'<div class="avatar avatar-lg" style="background:'+esc(st.Avatar_Color)+';color:#fff">'+getInitials(st.Full_Name)+'</div>'
    +'<div><div style="font-size:1rem;font-weight:600">'+esc(st.Full_Name)+'</div>'
    +'<div style="font-size:.78rem;color:var(--text-muted)">'+levelLabel+' · Nhóm: '+esc(st.Group_ID)+'</div></div></div>';
  body+='<div class="stats-grid" style="margin-bottom:12px">'
    +'<div class="stat-card"><div class="stat-label">Bài nộp</div><div class="stat-value">'+st.submitted+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">Peer Review</div><div class="stat-value" style="color:var(--amber)">'+st.avgScore+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">GV Chấm</div><div class="stat-value" style="color:var(--blue)">'+(st.teacherAvgScore > 0 ? st.teacherAvgScore : '—')+'</div></div>'
    +'<div class="stat-card"><div class="stat-label">Tiến độ</div><div class="stat-value">'+st.completionRate+'%</div></div></div>';
  body+=buildSkillBar(appData.myClass.Skill1_Label,st.skillScores.skill1,5,'var(--green)')
    +buildSkillBar(appData.myClass.Skill2_Label,st.skillScores.skill2,5,'var(--blue)')
    +buildSkillBar(appData.myClass.Skill3_Label,st.skillScores.skill3,5,'var(--purple)');
  if(st.weakest) body+='<div class="alert-row alert-blue" style="margin-top:12px"><div class="alert-text">⚠️ Kỹ năng yếu nhất: <strong>'+esc(st.weakest)+'</strong>. Đề xuất cần theo dõi thêm.</div></div>';

  // Submissions list for teacher to review
  var stSubs = (appData.submissions || []).filter(function(s) { return s.User_ID === userId; });
  body += '<div class="section-title" style="margin-top:16px">📄 Danh sách bài nộp ('+stSubs.length+')</div>';
  if (stSubs.length === 0) {
    body += '<p style="font-size:.82rem;color:var(--text-muted);font-style:italic">Học viên chưa nộp bài nào.</p>';
  } else {
    body += '<div style="display:flex;flex-direction:column;gap:8px">';
    stSubs.forEach(function(s) {
      var tRev = (appData.teacherReviews || []).find(function(tr) { return tr.Sub_ID === s.Sub_ID; });
      var peerRevs = (appData.reviews || []).filter(function(r) { return r.Sub_ID === s.Sub_ID; });
      var topic = (appData.curriculum || []).find(function(c) { return String(c.Session_No) === String(s.Session_No); });
      var tName = topic ? (' — ' + esc(topic.Topic_Name)) : '';
      
      body += '<div class="review-card" style="margin-bottom:0;border-left:3px solid '+(tRev?'var(--blue)':'var(--border)')+'">'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-start">'
        + '<div><div style="font-weight:600;font-size:.85rem">Buổi '+s.Session_No+tName+'</div>'
        + '<div style="font-size:.72rem;color:var(--text-muted)">Nộp: '+esc(s.Submitted_At)+'</div></div>'
        + '<button class="btn btn-sm '+(tRev?'btn-secondary':'btn-primary')+'" onclick="openTeacherReviewModal(\''+s.Sub_ID+'\',\''+userId+'\')">'
        + (tRev?'📝 Sửa điểm GV':'🎓 GV chấm bài') + '</button></div>'
        + '<div style="margin-top:8px;display:flex;gap:12px;font-size:.75rem">'
        + '<span>💬 '+peerRevs.length+' Peer Reviews</span>'
        + (tRev ? '<span style="color:var(--blue);font-weight:600">✅ GV đã chấm</span>' : '<span style="color:var(--text-muted)">⏳ GV chưa chấm</span>')
        + '</div></div>';
    });
    body += '</div>';
  }

  // Show journals if available
  var stJournals=(appData.journals||[]).filter(function(j){return j.User_ID===userId;});
  if(stJournals.length>0){
    body+='<div class="section-title" style="margin-top:16px">📖 Nhật ký gần nhất</div>';
    stJournals.slice(0,2).forEach(function(j){
      body+='<div class="journal-entry" style="border-left-color:var(--blue);margin-bottom:8px"><div class="journal-entry-header"><div class="journal-session">Buổi '+j.Session_No+'</div><div class="journal-date">'+timeAgo(j.Created_At)+'</div></div>'
        +'<div class="journal-section"><div class="journal-section-label">✅ Đã học</div><div class="journal-section-text">'+esc(j.Learned)+'</div></div>';
      if(j.Confused) body+='<div class="journal-section"><div class="journal-section-label">❓ Mơ hồ</div><div class="journal-section-text confused">'+esc(j.Confused)+'</div></div>';
      body+='</div>';
    });
  }
  openModal('Chi tiết — '+st.Full_Name,body,'<button class="btn" onclick="closeModal()">Đóng</button>');
}

function openTeacherReviewModal(subId, studentId) {
  var sub = appData.submissions.find(function(s) { return s.Sub_ID === subId; });
  var tRev = (appData.teacherReviews || []).find(function(tr) { return tr.Sub_ID === subId; });
  var peerRevs = (appData.reviews || []).filter(function(r) { return r.Sub_ID === subId; });
  var cls = appData.myClass;

  var topic = appData.curriculum ? appData.curriculum.find(function(c){return String(c.Session_No)===String(sub.Session_No);}) : null;
  var topicName = topic ? (' - ' + esc(topic.Topic_Name)) : '';

  var body = '<div style="margin-bottom:12px"><a href="'+esc(sub.Link_Submission)+'" target="_blank" class="btn btn-sm btn-secondary">📂 Mở link bài nộp (Buổi '+sub.Session_No+topicName+')</a></div>';
  
  // Hiển thị tóm tắt Peer Reviews để GV tham khảo
  if (peerRevs.length > 0) {
    body += '<div class="alert-row alert-blue" style="margin-bottom:16px"><div class="alert-text">💡 <strong>Tóm tắt Peer Review:</strong> ' + peerRevs.length + ' bạn đã chấm bài này. Điểm TB: ' 
      + Math.round((peerRevs.reduce(function(a,b){return a+(Number(b.Rating_Skill1)+Number(b.Rating_Skill2)+Number(b.Rating_Skill3))/3;},0)/peerRevs.length)*10)/10 + '/5.</div></div>';
  }

  body += '<div class="rubric" style="background:var(--bg-secondary);padding:15px;border-radius:var(--radius); border: 1px solid var(--border)">'
    + '<div class="rubric-title">Đánh giá của Giảng viên</div>'
    + buildStarRow(subId, cls.Skill1_Label, 1)
    + buildStarRow(subId, cls.Skill2_Label, 2)
    + buildStarRow(subId, cls.Skill3_Label, 3)
    + '<div class="form-group" style="margin-top:12px"><label class="form-label">Nhận xét chi tiết</label>'
    + '<textarea class="review-comment" id="t-reviewComment-'+subId+'" style="height:100px" placeholder="Nhận xét của GV...">'+(tRev?esc(tRev.Comment):'')+'</textarea></div>'
    + '</div>';

  openModal('Chấm bài — ' + subId, body, 
    '<button class="btn" onclick="showStudentModal(\''+studentId+'\')">Quay lại</button>'
    + '<button class="btn btn-primary" onclick="submitTeacherReviewAction(\''+subId+'\')">' + (tRev?'Cập nhật điểm':'Lưu đánh giá') + '</button>');

  // Fill existing stars if editing
  if (tRev) {
    setTimeout(function() {
      [1, 2, 3].forEach(function(sk) {
        var v = tRev['Rating_Skill'+sk];
        var stars = document.querySelectorAll('.star[data-sub="'+subId+'"][data-skill="'+sk+'"]');
        for (var i = 0; i < stars.length; i++) {
          if (Number(stars[i].getAttribute('data-val')) <= v) stars[i].classList.add('filled');
        }
      });
    }, 100);
  }
}

function submitTeacherReviewAction(subId) {
  var comment = document.getElementById('t-reviewComment-' + subId).value.trim();
  if (!comment) { showToast('Hãy viết nhận xét.', 'error'); return; }

  var scores = {};
  var hasMissing = false;
  [1, 2, 3].forEach(function(sk) {
    var stars = document.querySelectorAll('.star[data-sub="' + subId + '"][data-skill="' + sk + '"].filled');
    var activeStar = stars.length > 0 ? stars[stars.length - 1] : null;
    scores['Rating_Skill' + sk] = activeStar ? Number(activeStar.getAttribute('data-val')) : 0;
    if (scores['Rating_Skill' + sk] === 0) hasMissing = true;
  });

  if (hasMissing) {
    showToast('Hãy chấm đủ 3 tiêu chí.', 'error'); return;
  }

  showLoading(true, 'Đang lưu đánh giá...');
  google.script.run.withSuccessHandler(function(r) {
    showLoading(false);
    if (r.status === 'success') {
      showToast(r.message, 'success');
      loadAppData(); // Reload to refresh leaderboard & teacherReviews
      closeModal();
    } else showToast(r.message, 'error');
  }).withFailureHandler(function(e) {
    showLoading(false);
    showToast(e.message, 'error');
  }).submitTeacherReview({
    Sub_ID: subId,
    Teacher_ID: currentUser.User_ID,
    Rating_Skill1: scores.Rating_Skill1,
    Rating_Skill2: scores.Rating_Skill2,
    Rating_Skill3: scores.Rating_Skill3,
    Comment: comment
  });
}

// ==================== TEACHER: GROUPS ====================
function renderTeacherGroups(){
  var html='';
  appData.groups.forEach(function(g){
    var mids=String(g.Members||'').split(',').map(function(s){return s.trim();});
    var chips='';mids.forEach(function(id){var u=findUser(id);chips+='<span class="member-chip" style="padding:5px 10px">'+getInitials(u.Full_Name)+' — '+esc(u.Full_Name)+'</span>';});
    html+='<div class="card"><div class="card-header"><span style="font-weight:600">'+esc(g.Group_Name)+'</span><span class="pill pill-done">'+mids.length+' thành viên</span></div>'
      +'<div class="card-body"><div class="member-chips">'+chips+'</div></div></div>';
  });
  document.getElementById('tab-t-groups').innerHTML=html;
}

// ==================== TEACHER: ALERTS & BUDDY MATCHING (v2) ====================
function renderTeacherAlerts(){
  var totalSess=appData.myClass?Number(appData.myClass.Total_Sessions):10;
  var html='';

  // Buddy matching suggestions
  var matches=appData.buddyMatches||[];
  if(matches.length>0){
    html+='<div class="section-title">🤝 Gợi ý ghép Buddy (ZPD Matching)</div>'
      +'<p style="font-size:.78rem;color:var(--text-muted);margin-bottom:10px">Dựa trên điểm peer review, hệ thống gợi ý ghép HV dẫn đầu kèm HV cần hỗ trợ.</p>';
    matches.forEach(function(m){
      html+='<div class="buddy-match">'
        +'<div class="buddy-person"><div class="avatar" style="background:'+esc(m.mentor.Avatar_Color)+';color:#fff">'+getInitials(m.mentor.Full_Name)+'</div>'
        +'<div class="buddy-person-info"><div class="bp-name">'+esc(m.mentor.Full_Name)+'</div><div class="bp-detail">🟢 Mentor · Điểm TB: '+m.mentor.avgScore+'/5</div></div></div>'
        +'<div class="buddy-arrow">→</div>'
        +'<div class="buddy-person"><div class="avatar" style="background:'+esc(m.mentee.Avatar_Color)+';color:#fff">'+getInitials(m.mentee.Full_Name)+'</div>'
        +'<div class="buddy-person-info"><div class="bp-name">'+esc(m.mentee.Full_Name)+'</div><div class="bp-detail">'+(m.mentee.level==='inactive'?'⚫ Chưa HĐ':'🔴 Cần hỗ trợ')+' · Yếu: '+(m.mentee.weakest||'N/A')+'</div></div></div></div>';
    });
  }

  // Inactive students
  var inactive=appData.students.filter(function(s){return s.level==='inactive';});
  html+='<div class="section-title">⚠️ Học viên chưa nộp bài ('+inactive.length+')</div>';
  if(inactive.length===0) html+='<p style="color:var(--text-muted);font-style:italic;padding:10px 0">Tất cả HV đều đang hoạt động!</p>';
  inactive.forEach(function(s){
    html+='<div class="alert-row alert-red"><div class="avatar avatar-sm" style="background:var(--red-light);color:#501313">'+getInitials(s.Full_Name)+'</div>'
      +'<div class="alert-text"><strong>'+esc(s.Full_Name)+'</strong> — chưa nộp bài nào</div></div>';
  });

  // Needs-help students
  var needsHelp=appData.students.filter(function(s){return s.level==='needs-help';});
  if(needsHelp.length>0){
    html+='<div class="section-title" style="margin-top:16px">🔴 HV điểm thấp cần can thiệp ('+needsHelp.length+')</div>';
    needsHelp.forEach(function(s){
      html+='<div class="alert-row"><div class="avatar avatar-sm" style="background:'+esc(s.Avatar_Color)+';color:#fff">'+getInitials(s.Full_Name)+'</div>'
        +'<div class="alert-text"><strong>'+esc(s.Full_Name)+'</strong> — Điểm TB: '+s.avgScore+'/5 · Yếu nhất: '+(s.weakest||'N/A')+'</div>'
        +'<span class="alert-action" onclick="showStudentModal(\''+s.User_ID+'\')">Xem chi tiết →</span></div>';
    });
  }

  // Low-progress groups
  html+='<div class="section-title" style="margin-top:16px">📊 Nhóm tiến độ thấp</div>';
  var hasLow=false;
  appData.groups.forEach(function(g){
    var mids=String(g.Members||'').split(',').map(function(s){return s.trim();});
    var gs=appData.submissions.filter(function(s){return mids.indexOf(s.User_ID)!==-1;});
    var te=mids.length*totalSess;var pct=te>0?Math.round((gs.length/te)*100):0;
    if(pct<50){hasLow=true;
      html+='<div class="alert-row alert-blue"><div class="alert-text"><strong>'+esc(g.Group_Name)+'</strong> — tiến độ '+pct+'%, thấp hơn trung bình.</div></div>';
    }
  });
  if(!hasLow) html+='<p style="color:var(--text-muted);font-style:italic;padding:10px 0">Tất cả nhóm đang ổn!</p>';

  // Journals summary for teacher
  var jrn=appData.journals||[];
  if(jrn.length>0){
    html+='<div class="section-title" style="margin-top:16px">📝 Nhật ký gần đây từ HV ('+jrn.length+')</div>';
    jrn.sort(function(a,b){return new Date(b.Created_At)-new Date(a.Created_At);});
    jrn.slice(0,5).forEach(function(j){
      var u=findUser(j.User_ID);
      html+='<div class="journal-entry" style="border-left-color:var(--blue)"><div class="journal-entry-header">'
        +'<div class="journal-session">'+esc(u.Full_Name)+' — Buổi '+j.Session_No+'</div><div class="journal-date">'+timeAgo(j.Created_At)+'</div></div>'
        +'<div class="journal-section"><div class="journal-section-text">'+esc(j.Learned)+'</div></div>';
      if(j.Confused) html+='<div class="journal-section"><div class="journal-section-text confused">❓ '+esc(j.Confused)+'</div></div>';
      html+='</div>';
    });
  }
  document.getElementById('tab-t-alerts').innerHTML=html;
}

// ==================== NAVIGATION ====================
function switchTab(tabName,el){
  var all=document.querySelectorAll('.tab-content');for(var i=0;i<all.length;i++)all[i].classList.remove('active');
  var target=document.getElementById('tab-'+tabName);if(target){target.classList.add('active');currentTab=tabName;}
  var navs=document.querySelectorAll('.nav-item');for(var j=0;j<navs.length;j++)navs[j].classList.remove('active');
  if(el)el.classList.add('active');
  
  if(currentUser){
    var cls=appData.myClass;
    var info = {title: 'Esoft Buddy', sub: cls?cls.Class_Name:''};
    
    if(currentUser.Role==='student'){
      var gn=appData.myGroup?appData.myGroup.Group_Name:'Nhóm';
      var labels={
        'dashboard':{title:cls?cls.Class_Name:'Lớp',sub:'Lộ trình '+(cls?cls.Total_Sessions:10)+' buổi'},
        'feed':{title:gn+' — Thảo luận',sub:appData.groupMembers.length+' thành viên'},
        'review':{title:'Peer Review',sub:countPendingReviews()+' bài chờ review'},
        'leaderboard':{title:'Bảng xếp hạng',sub:''}, 'members':{title:'Nhóm của tôi — '+gn,sub:appData.groupMembers.length+' thành viên'},
        'progress':{title:'Tiến độ của tôi',sub:cls?cls.Class_Name:''},
        'journal':{title:'Nhật ký học tập',sub:'Metacognition & Reflection'}
      };
      info=labels[tabName]||{title:'Esoft Buddy',sub:''};
    } else {
      var teacherLabels={
        't-dashboard':{title:'Dashboard Giảng viên',sub:cls?cls.Class_Name:''},
        't-students':{title:'Chi tiết Học viên',sub:appData.students.length+' học viên'},
        't-groups':{title:'Quản lý Nhóm',sub:appData.groups.length+' nhóm'},
        't-alerts':{title:'Cảnh báo & Theo dõi',sub:''}
      };
      info=teacherLabels[tabName]||{title:'Esoft Buddy',sub:''};
    }
    renderTopbar(info.title, info.sub);
  }
}

// ==================== UTILITIES ====================
function showLoading(show,text){var o=document.getElementById('loadingOverlay');if(text)document.getElementById('loadingText').textContent=text;show?o.classList.remove('hidden'):o.classList.add('hidden');}
function showToast(msg,type){type=type||'info';var c=document.getElementById('toastContainer');var t=document.createElement('div');t.className='toast toast-'+type;
  var icon=type==='success'?'✅':(type==='error'?'❌':'ℹ️');t.innerHTML='<span>'+icon+'</span><span>'+esc(msg)+'</span>';c.appendChild(t);setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},4000);}
function openModal(title,bodyHtml,footerHtml){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=bodyHtml;document.getElementById('modalFooter').innerHTML=footerHtml;document.getElementById('modalBackdrop').classList.add('show');document.getElementById('modalContainer').classList.add('show');}
function closeModal(){document.getElementById('modalBackdrop').classList.remove('show');document.getElementById('modalContainer').classList.remove('show');}
function esc(str){if(str===null||str===undefined)return '';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getInitials(n){if(!n)return'??';var p=String(n).trim().split(/\s+/);return p.length===1?p[0].substring(0,2).toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase();}
function findUser(id){var list=appData.allUsers||appData.students||[];for(var i=0;i<list.length;i++){if(list[i].User_ID===id)return list[i];}return{Full_Name:id,Avatar_Color:'#ccc'};}
function timeAgo(d){if(!d)return '';var diff=Math.floor((new Date()-new Date(d))/1000);if(diff<60)return'Vừa xong';if(diff<3600)return Math.floor(diff/60)+' phút trước';if(diff<86400)return Math.floor(diff/3600)+' giờ trước';if(diff<604800)return Math.floor(diff/86400)+' ngày trước';return d;}
function buildSkillBar(label,value,max,color){var pct=max>0?Math.round((value/max)*100):0;return'<div class="skill-bar-container"><div class="skill-bar-label"><span>'+label+'</span><span>'+value+'/'+max+'</span></div><div class="skill-bar"><div class="skill-bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div></div>';}
</script>

</script>
